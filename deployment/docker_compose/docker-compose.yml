name: onyx
services:
  api_server:
    image: ${ONYX_BACKEND_IMAGE:-onyxdotapp/onyx-backend:${IMAGE_TAG:-latest}}
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
      - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
    command: '/bin/sh -c "alembic -n schema_private -x schemas=public  -x continue=true  -x continue=true upgrade head
      && alembic  -x continue=true  -x continue=true upgrade head && echo \"Starting Onyx Api Server\" && uvicorn onyx.main:app
      --host 0.0.0.0 --port 8080"

      '
    env_file:
    - .dokploy.env
    depends_on:
      relational_db:
        condition: service_started
      index:
        condition: service_started
      opensearch:
        condition: service_started
        required: false
      cache:
        condition: service_started
      inference_model_server:
        condition: service_started
      minio:
        condition: service_started
        required: false
    restart: unless-stopped
    environment:
    - AUTH_TYPE=${AUTH_TYPE:-basic}
    - FILE_STORE_BACKEND=${FILE_STORE_BACKEND:-s3}
    - POSTGRES_HOST=${POSTGRES_HOST:-relational_db}
    - VESPA_HOST=${VESPA_HOST:-index}
    - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch}
    - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-StrongPassword123!}
    - ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=${OPENSEARCH_FOR_ONYX_ENABLED:-true}
    - REDIS_HOST=${REDIS_HOST:-cache}
    - MODEL_SERVER_HOST=${MODEL_SERVER_HOST:-inference_model_server}
    - CODE_INTERPRETER_BASE_URL=${CODE_INTERPRETER_BASE_URL:-http://code-interpreter:8000}
    - UNSTRUCTURED_API_URL=${UNSTRUCTURED_API_URL:-http://unstructured:8000}
    - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
    - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:-minioadmin}
    - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:-minioadmin}
    - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
    - OUTPUTS_TEMPLATE_PATH=${OUTPUTS_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs}
    - VENV_TEMPLATE_PATH=${VENV_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/venv}
    - WEB_TEMPLATE_PATH=${WEB_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs/web}
    - PERSISTENT_DOCUMENT_STORAGE_PATH=${PERSISTENT_DOCUMENT_STORAGE_PATH:-/app/file-system}
    extra_hosts:
    - host.docker.internal:host-gateway
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '6'
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8080/health')
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 25s
    volumes:
    - api_server_logs:/var/log/onyx
    - file-system:/app/file-system
    networks:
    - onyx-compose-probe-5cha60
  background:
    image: ${ONYX_BACKEND_IMAGE:-onyxdotapp/onyx-backend:${IMAGE_TAG:-latest}}
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
      - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
    command: "/bin/sh -c \" if [ -f /app/scripts/setup_craft_templates.sh ]; then\n\
      \  /app/scripts/setup_craft_templates.sh;\nfi && if [ -f /etc/ssl/certs/custom-ca.crt\
      \ ]; then\n  update-ca-certificates;\nfi && /app/scripts/supervisord_entrypoint.sh\"\
      \n"
    env_file:
    - .dokploy.env
    depends_on:
      relational_db:
        condition: service_started
      index:
        condition: service_started
      opensearch:
        condition: service_started
        required: false
      cache:
        condition: service_started
      inference_model_server:
        condition: service_started
      indexing_model_server:
        condition: service_started
    restart: unless-stopped
    environment:
    - FILE_STORE_BACKEND=${FILE_STORE_BACKEND:-s3}
    - POSTGRES_HOST=${POSTGRES_HOST:-relational_db}
    - VESPA_HOST=${VESPA_HOST:-index}
    - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch}
    - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-StrongPassword123!}
    - ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=${OPENSEARCH_FOR_ONYX_ENABLED:-true}
    - REDIS_HOST=${REDIS_HOST:-cache}
    - MODEL_SERVER_HOST=${MODEL_SERVER_HOST:-inference_model_server}
    - INDEXING_MODEL_SERVER_HOST=${INDEXING_MODEL_SERVER_HOST:-indexing_model_server}
    - CODE_INTERPRETER_BASE_URL=${CODE_INTERPRETER_BASE_URL:-http://code-interpreter:8000}
    - UNSTRUCTURED_API_URL=${UNSTRUCTURED_API_URL:-http://unstructured:8000}
    - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
    - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:-minioadmin}
    - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:-minioadmin}
    - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
    - DISCORD_BOT_INVOKE_CHAR=${DISCORD_BOT_INVOKE_CHAR:-!}
    - API_SERVER_PROTOCOL=${API_SERVER_PROTOCOL:-http}
    - API_SERVER_HOST=${API_SERVER_HOST:-api_server}
    - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
    - OUTPUTS_TEMPLATE_PATH=${OUTPUTS_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs}
    - VENV_TEMPLATE_PATH=${VENV_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/venv}
    - WEB_TEMPLATE_PATH=${WEB_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs/web}
    - PERSISTENT_DOCUMENT_STORAGE_PATH=${PERSISTENT_DOCUMENT_STORAGE_PATH:-/app/file-system}
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - background_logs:/var/log/onyx
    - file-system:/app/file-system
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '6'
    networks:
    - onyx-compose-probe-5cha60
  web_server:
    image: ${ONYX_WEB_SERVER_IMAGE:-onyxdotapp/onyx-web-server:${IMAGE_TAG:-latest}}
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
      - NEXT_PUBLIC_DISABLE_LOGOUT=${NEXT_PUBLIC_DISABLE_LOGOUT:-}
      - NEXT_PUBLIC_FORGOT_PASSWORD_ENABLED=${NEXT_PUBLIC_FORGOT_PASSWORD_ENABLED:-}
      - NEXT_PUBLIC_THEME=${NEXT_PUBLIC_THEME:-}
      - NEXT_PUBLIC_DO_NOT_USE_TOGGLE_OFF_DANSWER_POWERED=${NEXT_PUBLIC_DO_NOT_USE_TOGGLE_OFF_DANSWER_POWERED:-false}
      - NODE_OPTIONS=${NODE_OPTIONS:-"--max-old-space-size=4096"}
    env_file:
    - .dokploy.env
    depends_on:
    - api_server
    restart: unless-stopped
    environment:
    - INTERNAL_URL=${INTERNAL_URL:-http://api_server:8080}
    networks:
    - onyx-compose-probe-5cha60
  inference_model_server:
    image: ${ONYX_MODEL_SERVER_IMAGE:-onyxdotapp/onyx-model-server:${IMAGE_TAG:-latest}}
    build:
      context: ../../backend
      dockerfile: Dockerfile.model_server
    command: "/bin/sh -c \"if [ \\\"${DISABLE_MODEL_SERVER:-}\\\" = \\\"True\\\" ]\
      \ || [ \\\"${DISABLE_MODEL_SERVER:-}\\\" = \\\"true\\\" ]; then\n  echo 'Skipping\
      \ service...';\n  exit 0;\nelse\n  exec uvicorn model_server.main:app --host\
      \ 0.0.0.0 --port 9000;\nfi\"\n"
    env_file:
    - .dokploy.env
    restart: unless-stopped
    volumes:
    - model_cache_huggingface:/app/.cache/huggingface/
    - inference_model_server_logs:/var/log/onyx
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '6'
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:9000/api/health')
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
    - onyx-compose-probe-5cha60
  indexing_model_server:
    image: ${ONYX_MODEL_SERVER_IMAGE:-onyxdotapp/onyx-model-server:${IMAGE_TAG:-latest}}
    build:
      context: ../../backend
      dockerfile: Dockerfile.model_server
    command: "/bin/sh -c \"if [ \\\"${DISABLE_MODEL_SERVER:-}\\\" = \\\"True\\\" ]\
      \ || [ \\\"${DISABLE_MODEL_SERVER:-}\\\" = \\\"true\\\" ]; then\n  echo 'Skipping\
      \ service...';\n  exit 0;\nelse\n  exec uvicorn model_server.main:app --host\
      \ 0.0.0.0 --port 9000;\nfi\"\n"
    env_file:
    - .dokploy.env
    restart: unless-stopped
    environment:
    - INDEXING_ONLY=True
    volumes:
    - indexing_huggingface_model_cache:/app/.cache/huggingface/
    - indexing_model_server_logs:/var/log/onyx
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '6'
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:9000/api/health')
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
    - onyx-compose-probe-5cha60
  relational_db:
    image: postgres:15.2-alpine
    shm_size: 1g
    command: -c 'max_connections=250'
    env_file:
    - .dokploy.env
    restart: unless-stopped
    environment:
    - POSTGRES_USER=${POSTGRES_USER:-postgres}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-postgres}
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
    - db_volume:/var/lib/postgresql/data
    networks:
    - onyx-compose-probe-5cha60
  index:
    image: vespaengine/vespa:8.609.39
    restart: unless-stopped
    env_file:
    - .dokploy.env
    environment:
    - VESPA_SKIP_UPGRADE_CHECK=${VESPA_SKIP_UPGRADE_CHECK:-true}
    volumes:
    - vespa_volume:/opt/vespa/var
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '6'
    networks:
    - onyx-compose-probe-5cha60
  opensearch:
    image: opensearchproject/opensearch:3.4.0
    restart: unless-stopped
    environment:
    - discovery.type=single-node
    - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-StrongPassword123!}
    - bootstrap.memory_lock=true
    - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
    volumes:
    - opensearch-data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '6'
    networks:
    - onyx-compose-probe-5cha60
  nginx:
    image: nginx:1.25.5-alpine
    restart: unless-stopped
    depends_on:
    - api_server
    - web_server
    env_file:
    - .dokploy.env
    environment:
    - DOMAIN=${DOMAIN:-localhost}
    - NGINX_PROXY_CONNECT_TIMEOUT=${NGINX_PROXY_CONNECT_TIMEOUT:-300}
    - NGINX_PROXY_SEND_TIMEOUT=${NGINX_PROXY_SEND_TIMEOUT:-300}
    - NGINX_PROXY_READ_TIMEOUT=${NGINX_PROXY_READ_TIMEOUT:-300}
    labels:
    - traefik.http.routers.onyx-compose-probe-5cha60-146-web.rule=Host(`onyx.dev.significa.sk`)
    - traefik.http.routers.onyx-compose-probe-5cha60-146-web.entrypoints=web
    - traefik.http.services.onyx-compose-probe-5cha60-146-web.loadbalancer.server.port=80
    - traefik.http.routers.onyx-compose-probe-5cha60-146-web.service=onyx-compose-probe-5cha60-146-web
    - traefik.http.routers.onyx-compose-probe-5cha60-146-web.middlewares=redirect-to-https@file,dev-defaults@file
    - traefik.http.routers.onyx-compose-probe-5cha60-146-websecure.rule=Host(`onyx.dev.significa.sk`)
    - traefik.http.routers.onyx-compose-probe-5cha60-146-websecure.entrypoints=websecure
    - traefik.http.services.onyx-compose-probe-5cha60-146-websecure.loadbalancer.server.port=80
    - traefik.http.routers.onyx-compose-probe-5cha60-146-websecure.service=onyx-compose-probe-5cha60-146-websecure
    - traefik.http.routers.onyx-compose-probe-5cha60-146-websecure.tls.certresolver=letsencrypt
    - traefik.enable=true
    - traefik.enable=${TRAEFIK_ENABLED:-false}
    - traefik.http.routers.onyx.rule=Host(`${DOMAIN:-localhost}`)
    - traefik.http.routers.onyx.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}
    - traefik.http.routers.onyx.priority=${TRAEFIK_PRIORITY:-100}
    - traefik.http.routers.onyx.tls=${TRAEFIK_TLS:-true}
    - traefik.http.routers.onyx.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
    - traefik.http.routers.onyx.service=onyx-svc
    - traefik.http.services.onyx-svc.loadbalancer.server.port=80
    - traefik.http.routers.onyx-compose-probe-5cha60-146-websecure.middlewares=dev-defaults@file
    volumes:
    - ../data/nginx:/nginx-templates:ro
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '6'
    command: '/bin/sh -c "rm -f /etc/nginx/conf.d/default.conf && cp -a /nginx-templates/.
      /etc/nginx/conf.d/ && sed ''s/\r$//'' /etc/nginx/conf.d/run-nginx.sh > /tmp/run-nginx.sh
      && chmod +x /tmp/run-nginx.sh && /tmp/run-nginx.sh app.conf.template"

      '
    networks:
    - onyx-compose-probe-5cha60
  cache:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    env_file:
    - .dokploy.env
    tmpfs:
    - /data
    networks:
    - onyx-compose-probe-5cha60
  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z-cpuv1
    profiles:
    - s3-filestore
    restart: unless-stopped
    env_file:
    - .dokploy.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DEFAULT_BUCKETS: ${S3_FILE_STORE_BUCKET_NAME:-onyx-file-store-bucket}
    volumes:
    - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test:
      - CMD
      - mc
      - ready
      - local
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
    - onyx-compose-probe-5cha60
  code-interpreter:
    image: onyxdotapp/code-interpreter:${CODE_INTERPRETER_IMAGE_TAG:-latest}
    command:
    - bash
    - ./entrypoint.sh
    - code-interpreter-api
    restart: unless-stopped
    env_file:
    - .dokploy.env
    user: root
    volumes:
    - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    networks:
    - onyx-compose-probe-5cha60
  unstructured_api:
    image: ${UNSTRUCTURED_API_IMAGE:-downloads.unstructured.io/unstructured-io/unstructured-api:latest}
    restart: unless-stopped
    env_file:
    - .dokploy.env
    networks:
      default:
        aliases:
        - unstructured
        - unstructured_api
      onyx-compose-probe-5cha60: {}
  ollama:
    profiles:
    - local-ollama
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
    - ollama_data:/root/.ollama
    environment:
    - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test:
      - CMD-SHELL
      - bash -c 'exec 3<>/dev/tcp/localhost/11434' || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
    - onyx-compose-probe-5cha60
volumes:
  db_volume: null
  vespa_volume: null
  minio_data: null
  ollama_data: null
  model_cache_huggingface: null
  indexing_huggingface_model_cache: null
  api_server_logs: null
  background_logs: null
  inference_model_server_logs: null
  indexing_model_server_logs: null
  file-system: null
  opensearch-data: null
networks:
  onyx-compose-probe-5cha60:
    name: onyx-compose-probe-5cha60
    external: true
