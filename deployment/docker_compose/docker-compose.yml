name: onyx
services:
  api_server:
    image: ${ONYX_BACKEND_IMAGE:-onyxdotapp/onyx-backend:${IMAGE_TAG:-latest}}
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
        - ENABLE_CRAFT_DOCKER=${ENABLE_CRAFT_DOCKER:-false}
    command: |
      /bin/sh -c "set -e;
      require_craft_runtime() {
        case "$$ENABLE_CRAFT" in
          true|True) ;;
          *) return 0 ;;
        esac
        command -v curl >/dev/null 2>&1 || {
          echo 'Craft runtime image is missing curl. Rebuild the backend image with ENABLE_CRAFT=true.' >&2;
          exit 1;
        }
        command -v opencode >/dev/null 2>&1 || {
          echo 'Craft runtime image is missing opencode. Rebuild the backend image with ENABLE_CRAFT=true.' >&2;
          exit 1;
        }
        case "$$ENABLE_CRAFT_DOCKER" in
          true|True)
            command -v docker >/dev/null 2>&1 || {
              echo 'Craft Docker support is enabled but docker CLI is missing. Rebuild the backend image with ENABLE_CRAFT_DOCKER=true.' >&2;
              exit 1;
            }
            docker compose version >/dev/null 2>&1 || {
              echo 'Craft Docker support is enabled but docker compose plugin is missing. Rebuild the backend image with ENABLE_CRAFT_DOCKER=true.' >&2;
              exit 1;
            }
            [ -S /var/run/docker.sock ] || {
              echo 'Craft Docker support is enabled but /var/run/docker.sock is not mounted.' >&2;
              exit 1;
            }
            ;;
        esac
      };
      require_craft_runtime &&
      alembic upgrade head &&
      echo \"Starting Onyx Api Server\" &&
      uvicorn onyx.main:app --host 0.0.0.0 --port 8080"
    env_file:
      - .dokploy.env
    depends_on:
      relational_db:
        condition: service_healthy
      index:
        condition: service_started
      opensearch:
        condition: service_started
        required: false
      cache:
        condition: service_healthy
      inference_model_server:
        condition: service_healthy
      minio:
        condition: service_healthy
        required: false
    restart: unless-stopped
    environment:
      - AUTH_TYPE=${AUTH_TYPE:-basic}
      - FILE_STORE_BACKEND=${FILE_STORE_BACKEND:-s3}
      - POSTGRES_HOST=${POSTGRES_HOST:-relational_db}
      - VESPA_HOST=${VESPA_HOST:-index}
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch}
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-StrongPassword123!}
      - ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=${OPENSEARCH_FOR_ONYX_ENABLED:-true}
      - REDIS_HOST=${REDIS_HOST:-cache}
      - MODEL_SERVER_HOST=${MODEL_SERVER_HOST:-inference_model_server}
      - CODE_INTERPRETER_BASE_URL=${CODE_INTERPRETER_BASE_URL:-http://code-interpreter:8000}
      - UNSTRUCTURED_API_URL=${UNSTRUCTURED_API_URL:-http://unstructured_api:8000}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:-minioadmin}
      - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:-minioadmin}
      - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
      - ENABLE_CRAFT_DOCKER=${ENABLE_CRAFT_DOCKER:-false}
      - PATH=/root/.opencode/bin:/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - SANDBOX_NEXTJS_BUNDLER=${SANDBOX_NEXTJS_BUNDLER:-webpack}
      - SANDBOX_NEXTJS_REQUEST_TIMEOUT_SECONDS=${SANDBOX_NEXTJS_REQUEST_TIMEOUT_SECONDS:-20}
      - OUTPUTS_TEMPLATE_PATH=${OUTPUTS_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs}
      - VENV_TEMPLATE_PATH=${VENV_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/venv}
      - WEB_TEMPLATE_PATH=${WEB_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs/web}
      - CRAFT_NPM_CACHE_DIR=${CRAFT_NPM_CACHE_DIR:-/var/cache/onyx-craft/npm}
      - CRAFT_PIP_CACHE_DIR=${CRAFT_PIP_CACHE_DIR:-/var/cache/onyx-craft/pip}
      - PERSISTENT_DOCUMENT_STORAGE_PATH=${PERSISTENT_DOCUMENT_STORAGE_PATH:-/app/file-system}
    extra_hosts:
      - host.docker.internal:host-gateway
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "6"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8080/health')
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 300s
    volumes:
      - api_server_logs:/var/log/onyx
      - file-system:/app/file-system
      - craft_npm_cache:/var/cache/onyx-craft/npm
      - craft_pip_cache:/var/cache/onyx-craft/pip
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - ../../backend/onyx/connectors/google_drive/connector.py:/app/onyx/connectors/google_drive/connector.py:ro
      - ../../backend/onyx/connectors/google_utils/resources.py:/app/onyx/connectors/google_utils/resources.py:ro
      - ../../backend/onyx/server/features/build/api/sessions_api.py:/app/onyx/server/features/build/api/sessions_api.py:ro
      - ../../backend/onyx/server/features/build/sandbox/local/process_manager.py:/app/onyx/server/features/build/sandbox/local/process_manager.py:ro
      - ../../backend/onyx/server/features/build/sandbox/manager/directory_manager.py:/app/onyx/server/features/build/sandbox/manager/directory_manager.py:ro
      - ../../backend/onyx/deep_research/dr_loop.py:/app/onyx/deep_research/dr_loop.py:ro
      - ../../backend/onyx/prompts/deep_research/dr_tool_prompts.py:/app/onyx/prompts/deep_research/dr_tool_prompts.py:ro
      - ../../backend/onyx/prompts/deep_research/orchestration_layer.py:/app/onyx/prompts/deep_research/orchestration_layer.py:ro
      - ../../backend/sitecustomize.py:/app/sitecustomize.py:ro
      - ../../backend/onyx/server/query_and_chat/chat_backend.py:/app/onyx/server/query_and_chat/chat_backend.py:ro
      - ../../backend/onyx/server/manage/code_interpreter/api.py:/app/onyx/server/manage/code_interpreter/api.py:ro
      - ../../backend/onyx/tools/tool_implementations/python/code_interpreter_client.py:/app/onyx/tools/tool_implementations/python/code_interpreter_client.py:ro
    networks:
      - dokploy_external
  background:
    image: ${ONYX_BACKEND_IMAGE:-onyxdotapp/onyx-backend:${IMAGE_TAG:-latest}}
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
        - ENABLE_CRAFT_DOCKER=${ENABLE_CRAFT_DOCKER:-false}
    command: |
      /bin/sh -c "set -e;
      require_craft_runtime() {
        case "$$ENABLE_CRAFT" in
          true|True) ;;
          *) return 0 ;;
        esac
        command -v curl >/dev/null 2>&1 || {
          echo 'Craft runtime image is missing curl. Rebuild the backend image with ENABLE_CRAFT=true.' >&2;
          exit 1;
        }
        command -v opencode >/dev/null 2>&1 || {
          echo 'Craft runtime image is missing opencode. Rebuild the backend image with ENABLE_CRAFT=true.' >&2;
          exit 1;
        }
      };
      require_craft_runtime &&
      if [ -f /app/scripts/setup_craft_templates.sh ]; then
        /app/scripts/setup_craft_templates.sh;
      fi &&
      if [ -f /etc/ssl/certs/custom-ca.crt ]; then
        update-ca-certificates;
      fi &&
      /app/scripts/supervisord_entrypoint.sh"
    env_file:
      - .dokploy.env
    depends_on:
      relational_db:
        condition: service_healthy
      index:
        condition: service_started
      opensearch:
        condition: service_started
        required: false
      cache:
        condition: service_healthy
      inference_model_server:
        condition: service_healthy
      indexing_model_server:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - FILE_STORE_BACKEND=${FILE_STORE_BACKEND:-s3}
      - POSTGRES_HOST=${POSTGRES_HOST:-relational_db}
      - VESPA_HOST=${VESPA_HOST:-index}
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch}
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-StrongPassword123!}
      - ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=${OPENSEARCH_FOR_ONYX_ENABLED:-true}
      - REDIS_HOST=${REDIS_HOST:-cache}
      - MODEL_SERVER_HOST=${MODEL_SERVER_HOST:-inference_model_server}
      - INDEXING_MODEL_SERVER_HOST=${INDEXING_MODEL_SERVER_HOST:-indexing_model_server}
      - CODE_INTERPRETER_BASE_URL=${CODE_INTERPRETER_BASE_URL:-http://code-interpreter:8000}
      - UNSTRUCTURED_API_URL=${UNSTRUCTURED_API_URL:-http://unstructured_api:8000}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_AWS_ACCESS_KEY_ID=${S3_AWS_ACCESS_KEY_ID:-minioadmin}
      - S3_AWS_SECRET_ACCESS_KEY=${S3_AWS_SECRET_ACCESS_KEY:-minioadmin}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_BOT_INVOKE_CHAR=${DISCORD_BOT_INVOKE_CHAR:-!}
      - API_SERVER_PROTOCOL=${API_SERVER_PROTOCOL:-http}
      - API_SERVER_HOST=${API_SERVER_HOST:-api_server}
      - ENABLE_CRAFT=${ENABLE_CRAFT:-false}
      - PATH=/root/.opencode/bin:/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - OUTPUTS_TEMPLATE_PATH=${OUTPUTS_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs}
      - VENV_TEMPLATE_PATH=${VENV_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/venv}
      - WEB_TEMPLATE_PATH=${WEB_TEMPLATE_PATH:-/app/onyx/server/features/build/sandbox/kubernetes/docker/templates/outputs/web}
      - SANDBOX_NEXTJS_BUNDLER=${SANDBOX_NEXTJS_BUNDLER:-webpack}
      - CRAFT_NPM_CACHE_DIR=${CRAFT_NPM_CACHE_DIR:-/var/cache/onyx-craft/npm}
      - CRAFT_PIP_CACHE_DIR=${CRAFT_PIP_CACHE_DIR:-/var/cache/onyx-craft/pip}
      - PERSISTENT_DOCUMENT_STORAGE_PATH=${PERSISTENT_DOCUMENT_STORAGE_PATH:-/app/file-system}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - background_logs:/var/log/onyx
      - file-system:/app/file-system
      - craft_npm_cache:/var/cache/onyx-craft/npm
      - craft_pip_cache:/var/cache/onyx-craft/pip
      - ../../backend/sitecustomize.py:/app/sitecustomize.py:ro
      - ../../backend/onyx/connectors/google_drive/connector.py:/app/onyx/connectors/google_drive/connector.py:ro
      - ../../backend/onyx/connectors/google_utils/resources.py:/app/onyx/connectors/google_utils/resources.py:ro
      - ../../backend/onyx/tools/tool_implementations/python/code_interpreter_client.py:/app/onyx/tools/tool_implementations/python/code_interpreter_client.py:ro
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "6"
    networks:
      - dokploy_external
  web_server:
    image: ${ONYX_WEB_SERVER_IMAGE:-onyxdotapp/onyx-web-server:${IMAGE_TAG:-latest}}
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_DISABLE_LOGOUT=${NEXT_PUBLIC_DISABLE_LOGOUT:-}
        - NEXT_PUBLIC_FORGOT_PASSWORD_ENABLED=${NEXT_PUBLIC_FORGOT_PASSWORD_ENABLED:-}
        - NEXT_PUBLIC_THEME=${NEXT_PUBLIC_THEME:-}
        - NEXT_PUBLIC_DO_NOT_USE_TOGGLE_OFF_DANSWER_POWERED=${NEXT_PUBLIC_DO_NOT_USE_TOGGLE_OFF_DANSWER_POWERED:-false}
        - NODE_OPTIONS=${NODE_OPTIONS:-"--max-old-space-size=4096"}
    env_file:
      - .dokploy.env
    depends_on:
      - api_server
    restart: unless-stopped
    environment:
      - INTERNAL_URL=${INTERNAL_URL:-http://api_server:8080}
    volumes:
      - ./patches/a41c0d120f870974.js:/app/.next/static/chunks/a41c0d120f870974.js:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q --spider http://$$HOSTNAME:3000/
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - dokploy_external
  inference_model_server:
    image: ${ONYX_MODEL_SERVER_IMAGE:-onyxdotapp/onyx-model-server:${IMAGE_TAG:-latest}}
    build:
      context: ../../backend
      dockerfile: Dockerfile.model_server
    command: |
      /bin/sh -c "if [ \"${DISABLE_MODEL_SERVER:-}\" = \"True\" ] || [ \"${DISABLE_MODEL_SERVER:-}\" = \"true\" ]; then
        echo 'Skipping service...';
        exit 0;
      else
        exec uvicorn model_server.main:app --host 0.0.0.0 --port 9000;
      fi"
    env_file:
      - .dokploy.env
    restart: unless-stopped
    volumes:
      - model_cache_huggingface:/app/.cache/huggingface/
      - inference_model_server_logs:/var/log/onyx
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "6"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:9000/api/health')
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
      - dokploy_external
  indexing_model_server:
    image: ${ONYX_MODEL_SERVER_IMAGE:-onyxdotapp/onyx-model-server:${IMAGE_TAG:-latest}}
    build:
      context: ../../backend
      dockerfile: Dockerfile.model_server
    command: |
      /bin/sh -c "if [ \"${DISABLE_MODEL_SERVER:-}\" = \"True\" ] || [ \"${DISABLE_MODEL_SERVER:-}\" = \"true\" ]; then
        echo 'Skipping service...';
        exit 0;
      else
        exec uvicorn model_server.main:app --host 0.0.0.0 --port 9000;
      fi"
    env_file:
      - .dokploy.env
    restart: unless-stopped
    environment:
      - INDEXING_ONLY=True
    volumes:
      - indexing_huggingface_model_cache:/app/.cache/huggingface/
      - indexing_model_server_logs:/var/log/onyx
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "6"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:9000/api/health')
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
      - dokploy_external
  relational_db:
    image: postgres:15.2-alpine
    shm_size: 1g
    command: -c 'max_connections=250'
    env_file:
      - .dokploy.env
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres}
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_volume:/var/lib/postgresql/data
    networks:
      - dokploy_external
  index:
    image: vespaengine/vespa:8.609.39
    restart: unless-stopped
    env_file:
      - .dokploy.env
    environment:
      - VESPA_SKIP_UPGRADE_CHECK=${VESPA_SKIP_UPGRADE_CHECK:-true}
    volumes:
      - vespa_volume:/opt/vespa/var
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "6"
    networks:
      - dokploy_external
  opensearch:
    image: opensearchproject/opensearch:3.4.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-StrongPassword123!}
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "6"
    networks:
      - dokploy_external
  nginx:
    image: nginx:1.25.5-alpine
    restart: unless-stopped
    depends_on:
      api_server:
        condition: service_healthy
      web_server:
        condition: service_healthy
    env_file:
      - .dokploy.env
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - NGINX_PROXY_CONNECT_TIMEOUT=${NGINX_PROXY_CONNECT_TIMEOUT:-300}
      - NGINX_PROXY_SEND_TIMEOUT=${NGINX_PROXY_SEND_TIMEOUT:-300}
      - NGINX_PROXY_READ_TIMEOUT=${NGINX_PROXY_READ_TIMEOUT:-300}
    labels:
      - traefik.http.routers.onyx-compose-probe-5cha60-146-web.rule=Host(`onyx.dev.significa.sk`)
      - traefik.http.routers.onyx-compose-probe-5cha60-146-web.entrypoints=web
      - traefik.http.services.onyx-compose-probe-5cha60-146-web.loadbalancer.server.port=80
      - traefik.http.routers.onyx-compose-probe-5cha60-146-web.service=onyx-compose-probe-5cha60-146-web
      - traefik.http.routers.onyx-compose-probe-5cha60-146-web.middlewares=redirect-to-https@file,dev-defaults@file
      - traefik.http.routers.onyx-compose-probe-5cha60-146-websecure.rule=Host(`onyx.dev.significa.sk`)
      - traefik.http.routers.onyx-compose-probe-5cha60-146-websecure.entrypoints=websecure
      - traefik.http.services.onyx-compose-probe-5cha60-146-websecure.loadbalancer.server.port=80
      - traefik.http.routers.onyx-compose-probe-5cha60-146-websecure.service=onyx-compose-probe-5cha60-146-websecure
      - traefik.http.routers.onyx-compose-probe-5cha60-146-websecure.tls.certresolver=letsencrypt
      - traefik.enable=true
      - traefik.http.routers.onyx-compose-probe-5cha60-146-websecure.middlewares=dev-defaults@file
    volumes:
      - ../data/nginx:/nginx-templates:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q --spider http://127.0.0.1/ && wget -q -O - http://127.0.0.1/api/health | grep -q '"success":true'
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "6"
    command: |
      /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf && cp -a /nginx-templates/. /etc/nginx/conf.d/ && sed 's/\r$//' /etc/nginx/conf.d/run-nginx.sh > /tmp/run-nginx.sh && chmod +x /tmp/run-nginx.sh && /tmp/run-nginx.sh app.conf.template"
    networks:
      - dokploy_external
  cache:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    env_file:
      - .dokploy.env
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping | grep -q PONG
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    tmpfs:
      - /data
    networks:
      - dokploy_external
  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z-cpuv1
    profiles:
      - s3-filestore
    restart: unless-stopped
    env_file:
      - .dokploy.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DEFAULT_BUCKETS: ${S3_FILE_STORE_BUCKET_NAME:-onyx-file-store-bucket}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      interval: 30s
      timeout: 45s
      retries: 5
      start_period: 20s
    networks:
      - dokploy_external
  code-interpreter:
    image: onyxdotapp/code-interpreter:${CODE_INTERPRETER_IMAGE_TAG:-latest}
    command: >
      /bin/sh -c
      "set -e;
      python /onyx-patches/apply_code_interpreter_timeout_patch.py;
      docker image inspect onyxdotapp/python-executor-sci:latest >/dev/null 2>&1 || docker pull onyxdotapp/python-executor-sci:latest;
      exec bash ./entrypoint.sh code-interpreter-api"
    restart: unless-stopped
    env_file:
      - .dokploy.env
    user: root
    volumes:
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - ./patches/apply_code_interpreter_timeout_patch.py:/onyx-patches/apply_code_interpreter_timeout_patch.py:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - dokploy_external
  unstructured_api:
    image: ${UNSTRUCTURED_API_IMAGE:-downloads.unstructured.io/unstructured-io/unstructured-api:latest}
    restart: unless-stopped
    env_file:
      - .dokploy.env
    networks:
      default:
        aliases:
          - unstructured
          - unstructured_api
      dokploy_external: {}
  ollama:
    profiles:
      - local-ollama
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c 'exec 3<>/dev/tcp/localhost/11434' || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dokploy_external
volumes:
  db_volume: null
  vespa_volume: null
  minio_data: null
  ollama_data: null
  model_cache_huggingface: null
  indexing_huggingface_model_cache: null
  api_server_logs: null
  background_logs: null
  inference_model_server_logs: null
  indexing_model_server_logs: null
  file-system: null
  craft_npm_cache: null
  craft_pip_cache: null
  opensearch-data: null
networks:
  dokploy_external:
    name: ${DOKPLOY_EXTERNAL_NETWORK:-onyx-compose-probe-5cha60}
    external: true
